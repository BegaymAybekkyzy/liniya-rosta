services:
  backend:
    build: ./backend
    networks:
      - front
      - back
    depends_on:
      - mongo
    environment:
      - MONGO_URL=mongodb://mongo:27017/liniya-rosta

  mongo:
    image: mongo:latest
    networks:
      - back
    volumes:
      - mongo-data:/data/db
    restart: always
    ports:
      - "27017:27017"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    environment:
      - NEXT_PUBLIC_API_BASE_URL=/api
    networks:
      - front
      - back
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - front
      - back
    depends_on:
      - frontend
      - backend

networks:
  front:
    driver: bridge
  back:
    driver: bridge


volumes:
  mongo-data: